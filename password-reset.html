<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset | Creative Web Solutions</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #eef3ff; }
    .card { width: min(620px, 92%); background: #fff; border: 1px solid #dbe3f3; border-radius: 16px; padding: 2rem; box-shadow: 0 18px 46px rgba(15, 23, 42, 0.09); }
    .grid { display: grid; gap: 0.75rem; }
    input { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 0.7rem 0.8rem; }
    button { border: 0; border-radius: 10px; padding: 0.75rem 1rem; background: #0f766e; color: #fff; font-weight: 600; cursor: pointer; }
    .status { min-height: 1.25rem; }
    .ok { color: #166534; }
    .err { color: #b91c1c; }
    a { color: #0f766e; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Password Reset</h1>
    <p>Step 1: Request a token. Step 2: Submit a new password with that token.</p>

    <section>
      <h2>Request Reset Token</h2>
      <form id="requestForm" class="grid">
        <input id="email" type="email" placeholder="you@example.com" required>
        <button id="requestBtn" type="submit">Request Reset</button>
      </form>
      <p id="requestStatus" class="status" aria-live="polite"></p>
      <p id="tokenHint" class="status"></p>
    </section>

    <section>
      <h2>Set New Password</h2>
      <form id="confirmForm" class="grid">
        <input id="token" type="text" placeholder="Reset token" autocomplete="off" required>
        <input id="newPassword" type="password" placeholder="New password" required>
        <button id="confirmBtn" type="submit">Reset Password</button>
      </form>
      <p id="confirmStatus" class="status" aria-live="polite"></p>
    </section>

    <p><a href="login.html">Back to login</a></p>
  </main>

  <script>
    if (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      window.CWS_API_BASE = 'http://localhost:3000';
    }
  </script>
  <script src="auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const tokenInput = document.getElementById('token');
    const presetToken = params.get('token');
    if (presetToken) tokenInput.value = presetToken;

    const requestStatus = document.getElementById('requestStatus');
    const tokenHint = document.getElementById('tokenHint');
    const confirmStatus = document.getElementById('confirmStatus');

    document.getElementById('requestForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const requestBtn = document.getElementById('requestBtn');
      requestBtn.disabled = true;
      requestBtn.textContent = 'Requesting...';
      requestStatus.textContent = '';
      tokenHint.textContent = '';
      try {
        const result = await SiteAuth.requestPasswordReset(document.getElementById('email').value.trim());
        requestStatus.className = 'status ok';
        requestStatus.textContent = result.message || 'If the account exists, a reset token was generated.';
        if (result.resetToken) {
          tokenHint.textContent = `Dev token: ${result.resetToken}`;
          tokenInput.value = result.resetToken;
        }
      } catch (error) {
        requestStatus.className = 'status err';
        requestStatus.textContent = error.message || 'Unable to request password reset.';
      } finally {
        requestBtn.disabled = false;
        requestBtn.textContent = 'Request Reset';
      }
    });

    document.getElementById('confirmForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const confirmBtn = document.getElementById('confirmBtn');
      confirmBtn.disabled = true;
      confirmBtn.textContent = 'Updating...';
      confirmStatus.textContent = '';
      try {
        const result = await SiteAuth.confirmPasswordReset(
          document.getElementById('token').value.trim(),
          document.getElementById('newPassword').value
        );
        confirmStatus.className = 'status ok';
        confirmStatus.textContent = result.message || 'Password reset complete. Redirecting...';
        setTimeout(() => { window.location.href = 'login.html'; }, 1000);
      } catch (error) {
        confirmStatus.className = 'status err';
        confirmStatus.textContent = error.message || 'Unable to reset password.';
      } finally {
        confirmBtn.disabled = false;
        confirmBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
