<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found. Return to Creative Web Solutions homepage.">
  <title>Page Not Found | Creative Web Solutions</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; text-align: center; padding: 2rem; }
    .shell { max-width: 480px; }
    .code { font-size: 7rem; font-weight: 800; line-height: 1; color: var(--primary); opacity: 0.15; margin: 0; font-family: 'Sora', sans-serif; }
    .shell h1 { margin: 0 0 1rem; font-size: 2rem; }
    .shell p { line-height: 1.8; margin: 0 0 2rem; color: var(--muted); }
    .actions { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
  </style>
</head>
<body>
  <div class="shell">
    <p class="code">404</p>
    <h1>Page not found</h1>
    <p>The page you&rsquo;re looking for doesn&rsquo;t exist or may have moved. Let&rsquo;s get you back on track.</p>
    <div class="actions">
      <a href="index.htm" class="cta-btn">Go home</a>
      <a href="index.htm#contact" class="cta-btn outline">Contact support</a>
    </div>
  </div>
  <footer></footer>
  <script defer src="theme.js"></script>
  <script defer src="footer.js"></script>
  <script defer src="header.js"></script>
</body>
</html>
