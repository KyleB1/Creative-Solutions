services:
  - type: web
    name: creative-solutions
    rootDir: .
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: creative-solutions-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: CUSTOMER_STORE_PATH
        value: /var/data/customer-accounts.json
      - key: SUPPORT_PORTAL_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Comma-separated list of allowed origins. GitHub Pages is included
      # automatically in code; add your custom domain here if you have one.
      - key: CORS_ALLOWED_ORIGINS
        value: https://kyleb1.github.io