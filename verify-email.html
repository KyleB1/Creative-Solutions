<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email | Creative Web Solutions</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f4f6fb; }
    .card { width: min(560px, 92%); background: #fff; border-radius: 16px; border: 1px solid #dbe3f3; padding: 2rem; box-shadow: 0 16px 44px rgba(15, 23, 42, 0.08); }
    h1 { margin-top: 0; }
    .row { display: grid; gap: 0.75rem; }
    input { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 0.7rem 0.8rem; }
    button { border: 0; border-radius: 10px; padding: 0.75rem 1rem; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; }
    .status { min-height: 1.25rem; }
    .ok { color: #166534; }
    .err { color: #b91c1c; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Verify Your Email</h1>
    <p>Paste your verification token or use the token from your signup response.</p>
    <form id="verifyForm" class="row">
      <input id="token" type="text" placeholder="Verification token" autocomplete="off" required>
      <button id="verifyBtn" type="submit">Verify Email</button>
      <p id="status" class="status" aria-live="polite"></p>
    </form>
    <p><a href="login.html">Back to login</a></p>
  </main>

  <script>
    if (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      window.CWS_API_BASE = 'http://localhost:3100';
    }
  </script>
  <script src="auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const tokenInput = document.getElementById('token');
    const status = document.getElementById('status');
    const verifyBtn = document.getElementById('verifyBtn');
    const initialToken = params.get('token');
    if (initialToken) tokenInput.value = initialToken;

    document.getElementById('verifyForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      status.textContent = '';
      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verifying...';
      try {
        const result = await SiteAuth.verifyEmail(tokenInput.value.trim());
        status.className = 'status ok';
        status.textContent = result.message || 'Email verified. Redirecting to login...';
        setTimeout(() => { window.location.href = 'login.html'; }, 1000);
      } catch (error) {
        status.className = 'status err';
        status.textContent = error.message || 'Unable to verify email.';
      } finally {
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify Email';
      }
    });
  </script>
</body>
</html>
